  .fact { background: var(--surface-2); border-radius: 8px; padding: 10px 12px; }
  .fact .k { font-size: 0.75rem; color: var(--ink-soft); letter-spacing: 0.3px; }
  .fact .v { font-size: 1.02rem; font-weight: 700; font-variant-numeric: tabular-nums; }

  .fact .v.pos { color: var(--up); }
  .oneliner { margin: 0; font-size: 0.95rem; color: var(--ink-soft); border-top: 1px dashed var(--line); padding-top: 12px; }

  .chev { color: var(--ink-soft); transition: transform 150ms ease; font-size: 0.8rem; }

  .sec-body { padding: 4px 18px 18px; border-top: 1px solid var(--line); font-size: 0.94rem; }
  .sec-body p { margin: 10px 0; }
  .sec-body ul { margin: 8px 0; padding-right: 20px; padding-left: 0; }
  .sec-body li { margin: 5px 0; }
  .sec-body b.warn { color: var(--down); }
  .sec-body b.good { color: var(--up); }

  .tbl { overflow-x: auto; margin: 12px 0; }
  table { border-collapse: collapse; width: 100%; font-size: 0.9rem; }
  th, td { border: 1px solid var(--line); padding: 7px 12px; text-align: right; }
  th { background: var(--surface-2); font-size: 0.82rem; }
  td { font-variant-numeric: tabular-nums; }

  .callout {

  .callout.plan { background: var(--surface-2); border-right: 3px solid var(--accent); }

  .final { margin-top: 18px; border: 1px solid var(--line); border-radius: 12px; background: var(--surface); padding: 20px; }

  .panel-view { display: none; }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }

  function select(i) {
    tabsEl.querySelectorAll("button").forEach((b, j) => b.setAttribute("aria-selected", String(i === j)));
