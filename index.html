<title>تطبيقاتي</title>
<style>
  :root {
    --bg: #F7F5F0; --surface: #FFFFFF; --ink: #17202E; --ink-soft: #5A6678;
    --line: #DDD8CC; --accent: #B8860B; --accent-ink: #8A6508;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0E1626; --surface: #162034; --ink: #E9E6DC; --ink-soft: #97A2B5;
      --line: #2A3652; --accent: #D9A441; --accent-ink: #E4BC6A;
    }
  }
  * { box-sizing: border-box; }
  body {
    direction: rtl; background: var(--bg); color: var(--ink); margin: 0;
    font-family: "Segoe UI", "SF Arabic", "Noto Naskh Arabic", "Geeza Pro", Tahoma, system-ui, sans-serif;
    line-height: 1.7; min-height: 100vh; display: grid; place-items: center; padding: 24px;
  }
  .box { max-width: 560px; width: 100%; }
  h1 { font-size: 1.5rem; margin: 0 0 4px; text-align: center; }
  .sub { color: var(--ink-soft); text-align: center; margin: 0 0 26px; font-size: 0.92rem; }
  a.app {
    display: flex; align-items: center; gap: 16px;
    background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
    padding: 18px 20px; margin: 12px 0; text-decoration: none; color: var(--ink);
    transition: border-color 120ms ease, transform 120ms ease;
  }
  a.app:hover { border-color: var(--accent); transform: translateY(-1px); }
  a.app:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .emoji { font-size: 1.9rem; }
  .t { font-weight: 700; font-size: 1.05rem; }
  .d { color: var(--ink-soft); font-size: 0.85rem; }
  .arrow { margin-inline-start: auto; color: var(--accent-ink); }
  footer { text-align: center; color: var(--ink-soft); font-size: 0.78rem; margin-top: 24px; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>

    <span><span class="t">Dowi Expenses — ميزانية الأسرة</span><br /><span class="d">دخل ومصاريف وحدود إنفاق مع تنبيهات — يعمل بدون إنترنت</span></span>
    <span class="arrow">◀</span>
  </a>

  <a class="app" href="reports.html">
    <span class="emoji">📊</span>
    <span><span class="t">تقارير التحليل</span><br /><span class="d">تقارير الأسهم الجاهزة بست عدسات وول ستريت</span></span>
    <span class="arrow">◀</span>
  </a>

  <a class="app" href="stock-analyzer.html">
    <span class="emoji">📈</span>
    <span><span class="t">محلل الأسهم</span><br /><span class="d">يبني برومبت تحليل شامل لأي سهم</span></span>
    <span class="arrow">◀</span>
  </a>

  <footer>ثبّت ميزانية الأسرة كتطبيق: افتحها ثم «Add to Home Screen»</footer>
</div>
